<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}Attendance System{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MrcW6ZMFY2rI5KJvUO8EwVb+3FWKxY4hJZk+H5Ry7tYFhLO3OwE7n7sM6Q0eZvvQ" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script>
    window.getCsrfToken = function() {
      const meta = document.querySelector('meta[name="csrf-token"]');
      return meta ? meta.content : '';
    };
  </script>
</head>
<body class="{% block body_class %}{% endblock %}">
{% block body %}{% endblock %}
  <div class="support-nav">
    <a href="{{ url_for('help_support') }}" class="support-nav-link">Help & Support</a>
    <span class="support-credit">© Biometric Credit</span>
  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-VjEeINv9OSwt0G+KF7S7jaZrFsaBXjsOMm/tB9LTS58ONXME5DkLtS3qm9Ekfvc3" crossorigin="anonymous"></script>
{% block scripts %}{% endblock %}
</body>
</html>
