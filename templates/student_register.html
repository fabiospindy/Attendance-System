{% extends "auth_base.html" %}
{% block title %}Student Registration — Attendance System{% endblock %}
{% block auth_content %}
<div class="auth-icon auth-icon-green">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
  </svg>
</div>
<h1 class="auth-title">Student registration</h1>
<p class="auth-sub">Create your account, then enroll your face</p>

{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

<form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="field-group"><label>Student ID</label>
    <input type="text" name="student_id" placeholder="e.g. STU001" required autofocus></div>
  <div class="field-group"><label>Full name</label>
    <input type="text" name="name" placeholder="e.g. Amara Osei" required></div>
  <div class="field-group"><label>Department</label>
    <input type="text" name="department" placeholder="e.g. Computer Science"></div>
  <div class="field-group"><label>Password</label>
    <input type="password" name="password" placeholder="At least 6 characters" required></div>
  <div class="field-group"><label>Confirm password</label>
    <input type="password" name="confirm_password" placeholder="••••••••" required></div>
  <button type="submit" class="btn-primary btn-full btn-green">Register & enroll face</button>
</form>
<div class="auth-footer">
  <a href="{{ url_for('student_login') }}">Already registered? Sign in</a>
</div>
{% endblock %}
